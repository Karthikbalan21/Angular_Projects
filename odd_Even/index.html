<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odd Even</title>
    <style>
        body{
            background-color:rgb(11, 201, 235);
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
        }
        h2{
            font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            font-style:italic;
            font-weight:bolder;
            font-size:40px;
        }
        .box{
            width:500px;
            height:250px;
            background-color:rgb(223, 12, 170);
            border:2px solid black;
            border-radius:20px;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
        }
        .box p{
            font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            font-size:20px;
            font-weight:bolder;
        }
        .box input{
            height:25px;
            width:200px;
            border:none;
            border:1px solid black;
            border-radius:10px;
            margin:10px;
            padding:5px;
            font-size:15px;
            font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;

        }
        .box button{
            height:30px;
            width:150px;
            border:none;
            border-radius:10px;
            background-color:rgb(11, 201, 235);
            font-size:15px;
            font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            cursor:pointer;
        }
        .box button:hover{
            background-color:rgb(12, 223, 40);
            color:white;
        }
    </style>
</head>
<body>
    <div>
        <h2>Odd Or Even Number Checking</h2>
    </div>
    <div class="box">
        <form name="oddeven">
            <p>Enter a number :</p>
            <input type="number" id="n1" placeholder="Enter a number" required>
            <button onclick="Check()">ODD EVEN CHECK</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
