<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="box">
        <div class="inp">
            <input type="text" readonly id="input">
        </div>
        <div class="btn">
            <button onclick="clearDisplay()" id="b">C</button>
            <button onclick="dappend('%')" id="b">%</button>
            <button onclick="dappend('/')" id="b">/</button>
            <button onclick="dappend('*')" id="b">*</button>
            <button onclick="dappend('-')" id="b">-</button>
            <button onclick="dappend('+')" id="b">+</button>
            <button onclick="dappend('9')">9</button>
            <button onclick="dappend('8')">8</button>
            <button onclick="dappend('7')">7</button>
            <button onclick="dappend('6')">6</button>
            <button onclick="dappend('5')">5</button>
            <button onclick="dappend('4')">4</button>
            <button onclick="dappend('1')">1</button>
            <button onclick="dappend('2')">2</button>
            <button onclick="dappend('3')">3</button>
            <button onclick="res()" id="b">=</button>
            <button onclick="dappend('0')">0</button>
            <button onclick="dappend('.')">.</button>
        </div>

    </div>
    <script src="script.js">
        console.log("JS Loaded");
    </script>
</body>
</html>
